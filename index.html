<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="script.js"></script>
  <!-- Three.js (required for Vanta.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>

  <!-- Vanta.js NET effect -->
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  





</head>

<body>
  <!-- 🔥 Page Section with Scoped Video Background -->
  <section class="page-section" id="3js">
    <!-- 🎥 Background Video (only for this section) -->
    <!-- <video autoplay muted loop class="video-bg">
      <source src="bg.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video> -->

    <!-- 🔗 Overlay Content (nav + search) -->
    <div class="overlay-content">
      <!-- Navbar -->
      <nav class="sidebar">
        <a href="#" class="logo">
          <i class="fas fa-door-open"></i>
          <span class="nav-text">Room Finder</span>
        </a>
        <div class="nav-links">
          <a href="#page-section" class="nav-item">
            <i class="fas fa-home"></i>
            <span class="nav-text">Home</span>
          </a>
          <a href="#chart" class="nav-item">
            <i class="fas fa-door-closed"></i>
            <span class="nav-text">Rooms</span>
          </a>
          <a href="#" class="nav-item">
            <i class="fas fa-users"></i>
            <span class="nav-text">Owners</span>
          </a>
          <a href="#about" class="nav-item">
            <i class="fas fa-info-circle"></i>
            <span class="nav-text">About</span>
          </a>
          <a href="#contact" class="nav-item">
            <i class="fas fa-envelope"></i>
            <span class="nav-text">Contact</span>
          </a>
        </div>
      </nav>

      <!-- Search -->
      <div class="search-container">
        <div class="search-box">
          <input type="text" placeholder="Location......." />
          <button>Search</button>
        </div>
      </div>
    </div>
    
    <div class="welcome-overlay">
      <h1 class="welcome-title">Welcome to Room Finder</h1>
      <p class="welcome-subtitle">Find your perfect space in seconds</p>
    </div>
  </section>



  
</body>
